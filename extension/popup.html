<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NavTab 收藏助手</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 360px;
        min-height: 200px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
      }
      #root { padding: 16px; }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 120px;
        color: #94a3b8;
        font-size: 14px;
      }
      .error {
        padding: 12px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 12px;
        color: #f87171;
        font-size: 13px;
        margin-bottom: 12px;
      }
      .success {
        padding: 12px;
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.2);
        border-radius: 12px;
        color: #4ade80;
        font-size: 13px;
        margin-bottom: 12px;
      }
      .field {
        margin-bottom: 12px;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 4px;
      }
      .field input, .field select {
        width: 100%;
        padding: 8px 12px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        color: #f1f5f9;
        font-size: 14px;
        outline: none;
      }
      .field input:focus, .field select:focus {
        border-color: #3b82f6;
      }
      .field select option {
        background: #1e293b;
        color: #f1f5f9;
      }
      .btn {
        width: 100%;
        padding: 10px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn:hover { background: #2563eb; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .header h1 {
        font-size: 16px;
        font-weight: 600;
      }
      .icon {
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border-radius: 6px;
      }
      .info {
        font-size: 12px;
        color: #64748b;
        margin-top: 8px;
        text-align: center;
      }
      .config-link {
        display: block;
        text-align: center;
        font-size: 12px;
        color: #3b82f6;
        margin-top: 12px;
        text-decoration: none;
      }
      .config-link:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">加载中...</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
